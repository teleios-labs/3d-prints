name: PR Checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build all parts
        run: uv run python scripts/build.py

      - name: Validate meshes
        run: |
          uv run python -c "
          import sys
          from pathlib import Path
          import trimesh

          output = Path('output')
          failed = False
          for stl in sorted(output.rglob('*.stl')):
              mesh = trimesh.load(str(stl))
              mesh.merge_vertices()
              # process(validate=True) cleans up duplicate/zero-area faces
              # and normal flips from OCCT's STL tessellation — without
              # it, otherwise-manifold meshes can report watertight=False.
              mesh.process(validate=True)
              # Manifold closed surfaces with through-holes have euler != 2
              # (each hole reduces euler by 2). The correct printability
              # check is watertight-ness + positive volume; euler_number
              # is logged for visibility but not used for pass/fail.
              watertight_ok = mesh.is_watertight
              volume_ok = mesh.volume > 0
              status = 'OK' if (watertight_ok and volume_ok) else 'FAIL'
              print(f'{stl.relative_to(output)}: {status} (watertight={watertight_ok}, bodies={mesh.body_count}, euler={mesh.euler_number}, volume={mesh.volume:.1f}, faces={len(mesh.faces)})')
              if not (watertight_ok and volume_ok):
                  failed = True
          sys.exit(1 if failed else 0)
          "

      - name: Run tests
        run: uv run pytest -v

      - name: Upload STL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stl-preview
          path: output/**/*.stl
